<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AWS Automation Agent</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f5f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: #f5f7fb;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(760px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .brand {
      margin-bottom: 24px;
    }

    .brand h1 {
      margin: 0 0 6px;
      font-size: clamp(1.45rem, 4vw, 2rem);
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 0;
      color: #667085;
      font-size: 0.95rem;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .card {
      border: 1px solid #e3e7ef;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 8px 28px rgba(31, 42, 68, 0.07);
    }

    .credentials-card {
      padding: 24px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.9rem;
      font-weight: 650;
    }

    input {
      width: 100%;
      border: 1px solid #cfd6e4;
      border-radius: 10px;
      padding: 11px 12px;
      color: #172033;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: #356ae6;
      box-shadow: 0 0 0 3px rgba(53, 106, 230, 0.13);
    }

    .button {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      font-weight: 700;
      transition: opacity 0.15s, transform 0.15s;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .primary {
      color: #fff;
      background: #2459d3;
    }

    .secondary {
      color: #25324b;
      background: #edf1f7;
    }

    .danger-text {
      min-height: 20px;
      margin: 12px 0 0;
      color: #c62828;
      font-size: 0.9rem;
    }

    .chat-card {
      display: flex;
      min-height: min(680px, calc(100vh - 145px));
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      min-height: 360px;
      max-height: calc(100vh - 260px);
      padding: 22px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 18px;
    }

    .message.user {
      display: flex;
      justify-content: flex-end;
    }

    .bubble {
      max-width: 85%;
      border-radius: 14px;
      padding: 11px 14px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .user .bubble {
      color: #fff;
      background: #2459d3;
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: #f0f3f8;
      border-bottom-left-radius: 4px;
    }

    .composer {
      display: flex;
      gap: 10px;
      border-top: 1px solid #e7eaf0;
      padding: 14px;
      background: #fff;
    }

    .composer input {
      flex: 1;
    }

    .spinner-row {
      display: flex;
      align-items: center;
      gap: 9px;
      color: #667085;
      font-size: 0.92rem;
    }

    .spinner {
      width: 17px;
      height: 17px;
      border: 2px solid #d8deea;
      border-top-color: #2459d3;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .plan-wrap {
      margin-bottom: 18px;
    }

    .plan-title {
      margin: 0 0 12px;
      font-size: 1rem;
    }

    .plan-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .plan-step {
      border: 1px solid #e2e7f0;
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .step-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      flex-wrap: wrap;
    }

    .step-number {
      display: grid;
      width: 26px;
      height: 26px;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: #344054;
      font-size: 0.78rem;
      font-weight: 750;
    }

    .tool-name {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.88rem;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .risk {
      margin-left: auto;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .risk.low {
      color: #176b3a;
      background: #dff6e8;
    }

    .risk.medium {
      color: #845400;
      background: #fff0bd;
    }

    .risk.high {
      color: #9f2424;
      background: #fde1e1;
    }

    .step-reason {
      margin: 0;
      color: #566176;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .verdict {
      border-left: 4px solid #8b95a7;
      border-radius: 8px;
      padding: 12px 14px;
      background: #f6f7fa;
    }

    .verdict strong {
      display: block;
      margin-bottom: 5px;
    }

    .warnings {
      margin: 6px 0 0;
      padding-left: 19px;
      color: #5c6678;
      font-size: 0.88rem;
    }

    .plan-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .inline-error {
      margin: 12px 0;
      color: #c62828;
      font-size: 0.9rem;
    }

    .results-card {
      padding: 22px;
    }

    .results-card h2 {
      margin: 0 0 18px;
      font-size: 1.25rem;
    }

    .results-list {
      display: grid;
      gap: 10px;
    }

    .result-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      border: 1px solid #e2e7f0;
      border-radius: 12px;
      padding: 13px;
    }

    .status-icon {
      display: grid;
      width: 26px;
      height: 26px;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-weight: 800;
    }

    .status-icon.success {
      background: #238755;
    }

    .status-icon.error {
      background: #c93636;
    }

    .result-title {
      margin-bottom: 5px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .result-output {
      margin: 0;
      color: #657084;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.82rem;
      line-height: 1.4;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .summary {
      margin: 20px 0;
      border-radius: 10px;
      padding: 14px;
      background: #f0f3f8;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    @media (max-width: 560px) {
      .shell {
        padding: 20px 12px;
      }

      .credentials-card,
      .results-card {
        padding: 18px;
      }

      .messages {
        padding: 16px;
      }

      .composer {
        align-items: stretch;
        flex-direction: column;
      }

      .composer .button,
      .credentials-card .button,
      .results-card .button {
        width: 100%;
      }

      .bubble {
        max-width: 92%;
      }

      .risk {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="brand">
      <h1>AWS Automation Agent</h1>
      <p>Plan, review, and safely execute AWS tasks.</p>
    </header>

    <section id="credentials-view" class="view active" aria-labelledby="credentials-title">
      <form id="credentials-form" class="card credentials-card">
        <h2 id="credentials-title">Connect to AWS</h2>
        <div class="field">
          <label for="access-key">AWS Access Key ID</label>
          <input id="access-key" name="access-key" type="password" autocomplete="off" required>
        </div>
        <div class="field">
          <label for="secret-key">AWS Secret Access Key</label>
          <input id="secret-key" name="secret-key" type="password" autocomplete="off" required>
        </div>
        <div class="field">
          <label for="region">Region</label>
          <input id="region" name="region" type="text" value="ap-south-1" required>
        </div>
        <button class="button primary" type="submit">Connect</button>
        <p id="credentials-error" class="danger-text" role="alert"></p>
      </form>
    </section>

    <section id="chat-view" class="view" aria-label="Chat">
      <div class="card chat-card">
        <div id="messages" class="messages" aria-live="polite">
          <div class="message assistant">
            <div class="bubble">What would you like to do in AWS?</div>
          </div>
        </div>
        <form id="chat-form" class="composer">
          <input id="message-input" type="text" placeholder="Describe an AWS task..." autocomplete="off" required>
          <button id="send-button" class="button primary" type="submit">Send</button>
        </form>
      </div>
    </section>

    <section id="results-view" class="view" aria-labelledby="results-title">
      <div class="card results-card">
        <h2 id="results-title">Execution results</h2>
        <div id="execution-status" class="spinner-row" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span>Executing plan...</span>
        </div>
        <div id="results-list" class="results-list" aria-live="polite"></div>
        <p id="results-error" class="inline-error" role="alert"></p>
        <div id="final-summary" class="summary" hidden></div>
        <button id="new-conversation" class="button primary" type="button">New conversation</button>
      </div>
    </section>
  </main>

  <script>
    const BASE_URL = "http://localhost:8000";

    let credentials = null;
    let sessionId = null;
    let currentPlan = null;
    let refinementMode = false;
    let requestInFlight = false;
    let pollGeneration = 0;

    const views = {
      credentials: document.getElementById("credentials-view"),
      chat: document.getElementById("chat-view"),
      results: document.getElementById("results-view")
    };

    const credentialsForm = document.getElementById("credentials-form");
    const credentialsError = document.getElementById("credentials-error");
    const chatForm = document.getElementById("chat-form");
    const messageInput = document.getElementById("message-input");
    const sendButton = document.getElementById("send-button");
    const messages = document.getElementById("messages");
    const resultsList = document.getElementById("results-list");
    const resultsError = document.getElementById("results-error");
    const executionStatus = document.getElementById("execution-status");
    const finalSummary = document.getElementById("final-summary");

    function showView(name) {
      Object.entries(views).forEach(([viewName, element]) => {
        element.classList.toggle("active", viewName === name);
      });
    }

    function setBusy(isBusy) {
      requestInFlight = isBusy;
      messageInput.disabled = isBusy;
      sendButton.disabled = isBusy;
    }

    function addMessage(role, text) {
      const row = document.createElement("div");
      row.className = `message ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      row.appendChild(bubble);
      messages.appendChild(row);
      scrollMessages();
      return row;
    }

    function addPlanningIndicator(label = "Planning...") {
      const row = document.createElement("div");
      row.className = "message assistant";
      const indicator = document.createElement("div");
      indicator.className = "spinner-row";
      const spinner = document.createElement("span");
      spinner.className = "spinner";
      spinner.setAttribute("aria-hidden", "true");
      const text = document.createElement("span");
      text.textContent = label;
      indicator.append(spinner, text);
      row.appendChild(indicator);
      messages.appendChild(row);
      scrollMessages();
      return row;
    }

    function scrollMessages() {
      messages.scrollTop = messages.scrollHeight;
    }

    function normalizeRisk(value) {
      const risk = String(value || "low").toLowerCase();
      return ["low", "medium", "high"].includes(risk) ? risk : "low";
    }

    function valueToText(value) {
      if (typeof value === "string") {
        return value;
      }
      try {
        return JSON.stringify(value);
      } catch {
        return String(value ?? "");
      }
    }

    function renderPlan(data) {
      currentPlan = data;
      sessionId = data.session_id || sessionId;
      refinementMode = false;

      const container = document.createElement("div");
      container.className = "message assistant plan-wrap";

      const title = document.createElement("h3");
      title.className = "plan-title";
      title.textContent = "Proposed plan";
      container.appendChild(title);

      const list = document.createElement("ol");
      list.className = "plan-list";
      const plan = Array.isArray(data.plan) ? data.plan : [];

      if (plan.length === 0) {
        const empty = document.createElement("div");
        empty.className = "bubble";
        empty.textContent = data.formatted_plan || "No AWS actions are needed.";
        container.appendChild(empty);
      } else {
        plan.forEach((step, index) => {
          const item = document.createElement("li");
          item.className = "plan-step";

          const heading = document.createElement("div");
          heading.className = "step-heading";

          const number = document.createElement("span");
          number.className = "step-number";
          number.textContent = step.step_number ?? index + 1;

          const tool = document.createElement("span");
          tool.className = "tool-name";
          tool.textContent = step.tool_name || step.tool || "Unknown tool";

          const riskLevel = normalizeRisk(step.risk_level || step.risk);
          const risk = document.createElement("span");
          risk.className = `risk ${riskLevel}`;
          risk.textContent = riskLevel;

          const reason = document.createElement("p");
          reason.className = "step-reason";
          reason.textContent = step.reason || step.tool_description || "No reason provided.";

          heading.append(number, tool, risk);
          item.append(heading, reason);
          list.appendChild(item);
        });
        container.appendChild(list);
      }

      container.appendChild(buildVerdict(data.jury_verdict || {}));

      const actions = document.createElement("div");
      actions.className = "plan-actions";

      const approveButton = document.createElement("button");
      approveButton.className = "button primary";
      approveButton.type = "button";
      approveButton.textContent = "Approve";
      approveButton.addEventListener("click", approvePlan);

      const modifyButton = document.createElement("button");
      modifyButton.className = "button secondary";
      modifyButton.type = "button";
      modifyButton.textContent = "Modify";
      modifyButton.addEventListener("click", () => {
        refinementMode = true;
        messageInput.placeholder = "Describe how the plan should change...";
        messageInput.focus();
        addMessage("assistant", "Tell me what you would like to change.");
      });

      actions.append(approveButton, modifyButton);
      container.appendChild(actions);
      messages.appendChild(container);
      scrollMessages();
    }

    function buildVerdict(verdict) {
      const card = document.createElement("div");
      card.className = "verdict";
      card.style.marginTop = "12px";

      const riskLevel = normalizeRisk(verdict.risk_level || verdict.risk);
      const title = document.createElement("strong");
      title.textContent = `Jury verdict: ${riskLevel} risk`;
      card.appendChild(title);

      const rawWarnings = verdict.warnings || verdict.warning || [];
      const warnings = Array.isArray(rawWarnings)
        ? rawWarnings
        : rawWarnings
          ? [rawWarnings]
          : [];

      if (warnings.length) {
        const list = document.createElement("ul");
        list.className = "warnings";
        warnings.forEach((warning) => {
          const item = document.createElement("li");
          item.textContent = valueToText(warning);
          list.appendChild(item);
        });
        card.appendChild(list);
      } else {
        const text = document.createElement("span");
        text.textContent = "No warnings.";
        card.appendChild(text);
      }

      return card;
    }

    function showInlineChatError(error) {
      const row = document.createElement("p");
      row.className = "inline-error";
      row.setAttribute("role", "alert");
      row.textContent = error.message || "Something went wrong.";
      messages.appendChild(row);
      scrollMessages();
    }

    async function apiRequest(path, options) {
      let response;
      try {
        response = await fetch(`${BASE_URL}${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {})
          }
        });
      } catch {
        throw new Error(`Could not reach the backend at ${BASE_URL}.`);
      }

      let data = null;
      const text = await response.text();
      if (text) {
        try {
          data = JSON.parse(text);
        } catch {
          data = { detail: text };
        }
      }

      if (!response.ok) {
        const message = data?.detail?.detail
          || data?.detail?.error
          || data?.detail
          || data?.error
          || `Request failed with status ${response.status}.`;
        throw new Error(valueToText(message));
      }

      return data;
    }

    credentialsForm.addEventListener("submit", (event) => {
      event.preventDefault();
      credentialsError.textContent = "";
      credentials = {
        aws_access_key_id: document.getElementById("access-key").value.trim(),
        aws_secret_access_key: document.getElementById("secret-key").value.trim(),
        region: document.getElementById("region").value.trim() || "ap-south-1"
      };

      if (!credentials.aws_access_key_id || !credentials.aws_secret_access_key) {
        credentialsError.textContent = "Both AWS credential fields are required.";
        return;
      }

      showView("chat");
      messageInput.focus();
    });

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (requestInFlight) {
        return;
      }

      const message = messageInput.value.trim();
      if (!message) {
        return;
      }

      addMessage("user", message);
      messageInput.value = "";
      const indicator = addPlanningIndicator();
      setBusy(true);

      try {
        let data;
        if (refinementMode && sessionId) {
          data = await apiRequest("/api/v1/approve", {
            method: "POST",
            body: JSON.stringify({
              session_id: sessionId,
              approved: false,
              refinement_message: message
            })
          });
        } else {
          data = await apiRequest("/api/v1/chat", {
            method: "POST",
            body: JSON.stringify({
              message,
              session_id: sessionId,
              ...credentials
            })
          });
        }
        indicator.remove();
        renderPlan(data);
      } catch (error) {
        indicator.remove();
        showInlineChatError(error);
      } finally {
        setBusy(false);
        messageInput.placeholder = "Describe an AWS task...";
      }
    });

    async function approvePlan() {
      if (!sessionId || requestInFlight) {
        return;
      }

      setBusy(true);
      pollGeneration += 1;
      const generation = pollGeneration;
      resultsList.replaceChildren();
      resultsError.textContent = "";
      finalSummary.hidden = true;
      finalSummary.textContent = "";
      executionStatus.hidden = false;
      showView("results");

      try {
        const data = await apiRequest("/api/v1/approve", {
          method: "POST",
          body: JSON.stringify({
            session_id: sessionId,
            approved: true
          })
        });

        if (data?.phase === "done" || data?.phase === "error") {
          renderExecution(data);
        } else {
          await pollSession(generation);
        }
      } catch (error) {
        executionStatus.hidden = true;
        resultsError.textContent = error.message || "Execution failed.";
      } finally {
        setBusy(false);
      }
    }

    async function pollSession(generation) {
      while (generation === pollGeneration) {
        await new Promise((resolve) => setTimeout(resolve, 1000));
        const data = await apiRequest(`/api/v1/session/${encodeURIComponent(sessionId)}`, {
          method: "GET"
        });

        if (Array.isArray(data)) {
          continue;
        }

        if (Array.isArray(data?.results)) {
          renderResultRows(data.results);
        }

        if (data?.phase === "done" || data?.phase === "error") {
          renderExecution(data);
          return;
        }
      }
    }

    function renderExecution(data) {
      executionStatus.hidden = true;
      renderResultRows(Array.isArray(data.results) ? data.results : []);
      finalSummary.textContent = data.summary || "Execution finished.";
      finalSummary.hidden = false;

      if (data.phase === "error") {
        resultsError.textContent = "The execution ended with an error.";
      }
    }

    function renderResultRows(results) {
      resultsList.replaceChildren();

      results.forEach((result, index) => {
        const success = String(result.status || "").toLowerCase() === "success";
        const row = document.createElement("article");
        row.className = "result-row";

        const icon = document.createElement("span");
        icon.className = `status-icon ${success ? "success" : "error"}`;
        icon.textContent = success ? "\u2713" : "\u00d7";
        icon.setAttribute("aria-label", success ? "Success" : "Failed");

        const content = document.createElement("div");
        const title = document.createElement("div");
        title.className = "result-title";
        const step = result.step ?? result.step_number ?? index + 1;
        const tool = result.tool || result.tool_name || "Unknown tool";
        title.textContent = `Step ${step}: ${tool}`;

        const output = document.createElement("p");
        output.className = "result-output";
        const fullOutput = valueToText(result.result ?? result.output ?? "");
        output.textContent = fullOutput.length > 200
          ? `${fullOutput.slice(0, 200)}...`
          : fullOutput;

        content.append(title, output);
        row.append(icon, content);
        resultsList.appendChild(row);
      });
    }

    document.getElementById("new-conversation").addEventListener("click", () => {
      pollGeneration += 1;
      sessionId = null;
      currentPlan = null;
      refinementMode = false;
      requestInFlight = false;
      resultsList.replaceChildren();
      resultsError.textContent = "";
      finalSummary.hidden = true;
      executionStatus.hidden = true;
      messages.replaceChildren();
      addMessage("assistant", "What would you like to do in AWS?");
      messageInput.disabled = false;
      sendButton.disabled = false;
      messageInput.placeholder = "Describe an AWS task...";
      showView("chat");
      messageInput.focus();
    });
  </script>
</body>
</html>
